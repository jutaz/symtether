name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Matrix leg name. Individual legs are not required by branch
    # protection; the `Test` summary job below rolls them up so we can
    # add or drop matrix legs without touching .github/rulesets.
    name: test-matrix (node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # 20 minutes: Windows runners are 2-3x slower for our subprocess
    # tests (cold Node startup + WASM instantiation per invocation),
    # and macOS runners occasionally spike on cache misses. 10 was
    # tight; 20 is comfortable without hiding a genuine hang.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Sparse matrix rather than os × node-version with excludes:
        # - Linux is cheapest, so run every supported major there,
        #   including current (26) to catch upcoming-LTS regressions
        #   before it promotes in Oct 2026.
        # - ubuntu-24.04-arm covers ARM64 server deployments
        #   (Graviton, Ampere). WASM should be arch-agnostic; verify.
        # - macOS and Windows test the declared engines.node floor
        #   (20) and current LTS (24). Node 22 is sandwiched by both
        #   on those platforms, so Linux-only coverage is enough.
        include:
          - { os: ubuntu-latest, node-version: 20 }
          - { os: ubuntu-latest, node-version: 22 }
          - { os: ubuntu-latest, node-version: 24 }
          - { os: ubuntu-latest, node-version: 26 }
          - { os: ubuntu-24.04-arm, node-version: 24 }
          - { os: macos-latest, node-version: 20 }
          - { os: macos-latest, node-version: 24 }
          - { os: windows-latest, node-version: 20 }
          - { os: windows-latest, node-version: 24 }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run build
      - run: npx vitest run

  dogfood:
    # See `test` for why this is a matrix-leg name, not the required
    # check. The `Dogfood` summary job below is what branch protection
    # gates on.
    name: dogfood-matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      # Ubuntu is the primary dogfood target; Windows is added to catch
      # path-handling regressions in the CLI (separators, case, CRLF)
      # that Linux CI would never surface.
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: node dist/cli.js check --strict --exclude 'test/fixtures/**'
      - run: node dist/cli.js update --check --exclude 'test/fixtures/**'

  # Summary jobs. Branch protection requires these instead of the
  # individual matrix legs, so we can grow or shrink the matrix without
  # editing .github/rulesets/main-protection.json.
  #
  # `if: always()` runs the summary even when a matrix leg fails or is
  # cancelled; the step then inspects `needs.<job>.result` and exits
  # non-zero unless every leg succeeded. `result` is one of success,
  # failure, cancelled, or skipped; only `success` counts.
  test-summary:
    name: Test
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify all test matrix legs succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::test matrix result: ${{ needs.test.result }}"
            exit 1
          fi

  dogfood-summary:
    name: Dogfood
    if: always()
    needs: [dogfood]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify all dogfood matrix legs succeeded
        run: |
          if [ "${{ needs.dogfood.result }}" != "success" ]; then
            echo "::error::dogfood matrix result: ${{ needs.dogfood.result }}"
            exit 1
          fi

  site:
    name: Site builds (refs verified)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build:site

  actionlint:
    # Lint .github/workflows/*.yml and the reusable action.yml. actionlint
    # catches unknown inputs and outputs, and expression bugs. Through
    # shellcheck (preinstalled on ubuntu-latest) it also type-checks the
    # bash in every `run:` block, including the script in action.yml.
    name: Lint workflows & action.yml
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install actionlint
        # The script URL is pinned to the v1.7.12 tag, and we pass 1.7.12
        # as the version argument. The upstream download script does not
        # verify a checksum. The binary is fetched over HTTPS from GitHub's
        # release CDN at a pinned version, which is good enough for a lint
        # job. Do not copy this pattern into publish.yml. When updating,
        # bump the URL tag and the argument together.
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash \
            -o /tmp/actionlint-install.bash
          bash /tmp/actionlint-install.bash 1.7.12
      - name: Run actionlint
        run: actionlint
