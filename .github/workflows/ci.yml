name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22, 24]
        exclude:
          # Full matrix on Linux; latest LTS elsewhere.
          - os: macos-latest
            node-version: 20
          - os: macos-latest
            node-version: 22
          - os: windows-latest
            node-version: 20
          - os: windows-latest
            node-version: 22
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run build
      - run: npx vitest run

  dogfood:
    name: Dogfood (symtether checks its own docs)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: node dist/cli.js check --strict --exclude 'test/fixtures/**'
      - run: node dist/cli.js update --check --exclude 'test/fixtures/**'

  site:
    name: Site builds (refs verified)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build:site

  publish:
    name: Publish to npm
    if: github.event_name == 'release'
    needs: [test, dogfood]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Environment gate: NPM_TOKEN lives in the npm-publish environment, adding
    # protection rules on top of the release-event gate. Fork PRs never reach
    # this job (release events require write access).
    environment: npm-publish
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci --ignore-scripts
      # .npmrc sets ignore-scripts=true repo-wide, which also suppresses
      # prepublishOnly — build and test explicitly before publishing.
      - run: npm run build
      - run: npm run lint
      - run: npx vitest run
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
