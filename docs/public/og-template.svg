<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Terminal ink base -->
  <rect width="1200" height="630" fill="#0B0E13"/>

  <!-- Subtle grid (design system: only recurring texture is a faint grid + glow) -->
  <g stroke="#151A22" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Wordmark: #sym:tether, top-left -->
  <text x="80" y="130" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="52" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#2EEF0A">#</tspan><tspan fill="#E8ECF3">sym</tspan><tspan fill="#2EEF0A">:</tspan><tspan fill="#8B94A7">tether</tspan>
  </text>

  <!-- Page title, wrapped by the plugin into up to three lines -->
  <text x="80" y="290" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="800" fill="#E8ECF3" letter-spacing="-1.5">{{line1}}</text>
  <text x="80" y="370" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="800" fill="#E8ECF3" letter-spacing="-1.5">{{line2}}</text>
  <text x="80" y="450" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="800" fill="#E8ECF3" letter-spacing="-1.5">{{line3}}</text>

  <!-- Footer: the ref example + tagline. The ref shows the #sym: hero token in neon. -->
  <text x="80" y="548" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="24" fill="#B7BECC">
    [fetchData](src/client.ts<tspan fill="#2EEF0A">#sym:</tspan>ApiClient.fetchData)
  </text>
  <text x="80" y="586" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#60677A">Tethered Docs. Real Code. Zero Hallucinations.</text>
</svg>
