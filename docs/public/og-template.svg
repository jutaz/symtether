<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1b1b1f"/>

  <!-- Subtle grid -->
  <g stroke="#26262c" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Accent bar + site name -->
  <rect x="80" y="92" width="8" height="52" rx="4" fill="#a8b1ff"/>
  <text x="112" y="130" font-family="sans-serif" font-size="42" font-weight="700" fill="#ffffff">{{siteName}}</text>

  <!-- Page title, wrapped by the plugin into up to three lines -->
  <text x="80" y="300" font-family="sans-serif" font-size="64" font-weight="700" fill="#ffffff">{{line1}}</text>
  <text x="80" y="380" font-family="sans-serif" font-size="64" font-weight="700" fill="#ffffff">{{line2}}</text>
  <text x="80" y="460" font-family="sans-serif" font-size="64" font-weight="700" fill="#ffffff">{{line3}}</text>

  <!-- Footer: the ref example -->
  <text x="80" y="548" font-family="monospace" font-size="24" fill="#a8b1ff">[fetchData](src/client.ts#sym:ApiClient.fetchData)</text>
  <text x="80" y="586" font-family="sans-serif" font-size="22" fill="#98989f">symtether.dev — docs that point at real code</text>
</svg>
