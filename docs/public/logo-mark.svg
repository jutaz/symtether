<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="symtether mark">
  <title>symtether</title>
  <!--
    #: monogram — font-independent geometric paths.
    Green neon (#2EEF0A) reserved per design system for logo + #sym: glow.
    Renders cleanly from 16px (favicon) up.
  -->
  <g fill="#2EEF0A">
    <!-- # -->
    <!-- two vertical bars (slightly slanted for the # look) -->
    <path d="M13 12 L18 12 L14 52 L9 52 Z"/>
    <path d="M25 12 L30 12 L26 52 L21 52 Z"/>
    <!-- two horizontal bars -->
    <rect x="6" y="22" width="28" height="5" rx="1"/>
    <rect x="4" y="37" width="28" height="5" rx="1"/>

    <!-- : -->
    <circle cx="46" cy="26" r="4"/>
    <circle cx="46" cy="42" r="4"/>
  </g>
</svg>
